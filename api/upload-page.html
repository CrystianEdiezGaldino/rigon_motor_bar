<body>
    <div class="container">
        <div class="header">
            <div class="logo">RIGON<span class="highlight">MOTOR</span>BAR</div>
            <div class="subtitle">Sistema de Upload de Cardápio</div>
        </div>
        
        <div class="upload-card">
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="cardapio_pdf" class="form-label">📄 Selecione o arquivo PDF do cardápio:</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="cardapio_pdf" name="cardapio_pdf" accept=".pdf" class="file-input" required>
                    </div>
                    <small style="color: #ccc; margin-top: 10px; display: block;">
                        Arquivos PDF até 10MB são aceitos
                    </small>
                </div>
                
                <button type="submit" id="submitBtn" class="upload-btn">
                    📤 Fazer Upload do Cardápio
                </button>
            </form>
            
            <div id="result" class="result"></div>
        </div>

            <div class="info-title">ℹ️ Informações do Sistema</div>
            <div class="info-grid">
                <div class="info-item">

                    <div class="info-value"><?php echo PHP_VERSION; ?></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Limite de Upload</div>
                    <div class="info-value"><?php echo ini_get('upload_max_filesize'); ?></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Tamanho Máximo POST</div>
                    <div class="info-value"><?php echo ini_get('post_max_size'); ?></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Tempo de Execução</div>
                    <div class="info-value"><?php echo ini_get('max_execution_time'); ?>s</div>
                </div>

        <div class="current-cardapio">
            <h3 style="margin-bottom: 20px; color: #ccc;">📋 Cardápio Atual</h3>
            <a href="https://rigonmotorbar.com.br/assets/imagens/cardapio.pdf" target="_blank" class="cardapio-link">
                👁️ Visualizar Cardápio Atual
            </a>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('cardapio_pdf');
            const submitBtn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            
            if (!fileInput.files[0]) {
                showResult('❌ Por favor, selecione um arquivo PDF.', 'error');
                return;
            }
            
            const file = fileInput.files[0];
            
            // Validar tipo de arquivo
            if (file.type !== 'application/pdf') {
                showResult('❌ Apenas arquivos PDF são aceitos.', 'error');
                return;
            }
            
            // Validar tamanho (10MB)
            if (file.size > 10 * 1024 * 1024) {
                showResult('❌ Arquivo muito grande. Máximo permitido: 10MB', 'error');
                return;
            }
            
            // Preparar FormData
            const formData = new FormData();
            formData.append('cardapio_pdf', file);
            
            // Mostrar loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span>Enviando...';
            showResult('⏳ Enviando arquivo...', 'info');
            
            try {
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showResult(`
                        <strong>✅ Upload realizado com sucesso!</strong><br><br>
                        <strong>📄 Arquivo:</strong> ${data.filename}<br>
                        <strong>📏 Tamanho:</strong> ${(data.size / 1024).toFixed(2)} KB<br>
                        <strong>💾 Backup criado:</strong> ${data.backup_created ? 'Sim' : 'Não'}<br><br>
                        <a href="${data.url}" target="_blank" style="color: #F45F0A; text-decoration: none; font-weight: bold;">
                            👁️ Visualizar novo cardápio
                        </a>
                    `, 'success');
                    
                    // Limpar formulário
                    fileInput.value = '';
                } else {
                    showResult(`<strong>❌ Erro no upload:</strong><br>${data.error}`, 'error');
                }
            } catch (error) {
                showResult(`<strong>❌ Erro de conexão:</strong><br>${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '📤 Fazer Upload do Cardápio';
            }
        });
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = message;
            resultDiv.className = `result ${type}`;
            resultDiv.style.display = 'block';
        }
    </script>
